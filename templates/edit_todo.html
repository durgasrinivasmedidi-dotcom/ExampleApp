<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Todo - Todo App</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>✏️ Edit Todo</h1>
        </header>

        <div class="form-container">
            <form action="{{ url_for('edit_todo', todo_id=todo.id) }}" method="POST">
                <div class="form-group">
                    <label for="title">Title *</label>
                    <input type="text" id="title" name="title" required placeholder="Enter todo title" value="{{ todo.title }}" autofocus>
                </div>

                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" name="description" placeholder="Enter todo description (optional)" rows="4">{{ todo.description }}</textarea>
                </div>

                <div class="form-group">
                    <label for="due_date">Due Date</label>
                    <input type="date" id="due_date" name="due_date" value="{% if todo.due_date %}{{ todo.due_date.strftime('%Y-%m-%d') }}{% endif %}">
                </div>

                <div class="form-group">
                    <label>Status:</label>
                    <p class="status-info">
                        {% if todo.completed %}
                            <span class="status-badge completed">✓ Completed</span>
                        {% else %}
                            <span class="status-badge pending">⏳ Pending</span>
                        {% endif %}
                    </p>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Update Todo</button>
                    <a href="{{ url_for('index') }}" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
